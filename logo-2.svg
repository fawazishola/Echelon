<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <rect x="70" y="45" width="80" height="28" rx="14" fill="#60A5FA" />
  <rect x="55" y="85" width="95" height="28" rx="14" fill="#60A5FA" />
  <rect x="75" y="125" width="80" height="28" rx="14" fill="#60A5FA" />
  
  <!-- Pink Star left -->
  <path d="M 35 100 l 3 6 l 7 1 l -5 4 l 1 7 l -6 -3 l -6 3 l 1 -7 l -5 -4 l 7 -1 Z" fill="#F472B6" transform="scale(1.5)" transform-origin="35 100"/>
  
  <!-- Yellow Dot top right -->
  <circle cx="110" cy="30" r="6" fill="#FBBF24"/>
  
  <!-- Light Blue Star bottom left -->
  <path d="M 60 160 l 2 4 l 5 1 l -4 3 l 1 5 l -4 -2 l -4 2 l 1 -5 l -4 -3 l 5 -1 Z" fill="#60A5FA" transform="scale(1.3)" transform-origin="60 160"/>
  
  <!-- Cap -->
  <g transform="translate(60, 45) rotate(-15)">
    <!-- Base -->
    <path d="M -16 0 L -16 16 C -16 26 16 26 16 16 L 16 0 Z" fill="#1E3A8A"/>
    <!-- Top -->
    <path d="M 0 -16 L 32 0 L 0 16 L -32 0 Z" fill="#2563EB"/>
    <!-- Wavy Tassel upwards -->
    <path d="M 0 0 C 15 -25 0 -35 25 -45" fill="none" stroke="#FBBF24" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
